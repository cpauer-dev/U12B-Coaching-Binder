<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#123524" />
  <meta name="description" content="Local-first youth soccer coaching binder." />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <title>Touchline Binder</title>
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Touchline Binder</h1>
      <p id="teamLabel">BSSC U12 Boys B</p>
    </div>
    <button id="installBtn" class="secondary hidden">Install</button>
  </header>

  <main id="app">
    <section id="dashboard" class="view active"></section>
    <section id="players" class="view"></section>
    <section id="events" class="view"></section>
    <section id="attendance" class="view"></section>
    <section id="practice" class="view"></section>
    <section id="matches" class="view"></section>
    <section id="development" class="view"></section>
    <section id="equipment" class="view"></section>
    <section id="settings" class="view"></section>
  </main>

  <nav class="bottom-nav" aria-label="Main navigation">
    <button data-view="dashboard">Home</button>
    <button data-view="players">Players</button>
    <button data-view="events">Events</button>
    <button data-view="practice">Practice</button>
    <button data-view="matches">Matches</button>
    <button data-view="settings">More</button>
  </nav>

  <dialog id="modal">
    <form method="dialog" id="modalForm">
      <div id="modalContent"></div>
      <div class="dialog-actions">
        <button value="cancel" class="secondary">Cancel</button>
        <button id="modalSave" value="default">Save</button>
      </div>
    </form>
  </dialog>

  <dialog id="phoneDialog">
    <div id="phoneContent"></div>
    <div class="dialog-actions"><button onclick="document.getElementById('phoneDialog').close()" class="secondary">Cancel</button></div>
  </dialog>

  <input id="importFile" type="file" accept="application/json" class="hidden" />

  <script src="app.js"></script>
</body>
</html>
